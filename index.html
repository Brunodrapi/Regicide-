<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Regicide</title>
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="apple-touch-icon" href="images/favicon.png">
<link rel="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@font-face{font-family:'VikingRunes';src:url('fonts/viking_middle_runes.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:block}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
:root{--vh:1vh}
html,body{width:100%;height:calc(var(--vh)*100);overflow:hidden}
body{display:flex;flex-direction:column;font-family:Georgia,serif;position:relative;
  background:url('images/banner.png') center/cover no-repeat fixed;
  padding-top:env(safe-area-inset-top);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  padding-bottom:env(safe-area-inset-bottom)}


/* ══ LANG BAR ══ */
#lang-bar{display:flex;gap:4px;justify-content:space-between;align-items:center;
  padding:6px 12px 0;flex-shrink:0;position:relative;z-index:1}
#logo-block{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
#logo-img{height:clamp(28px,5vh,46px);width:auto;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.7))}
#logo-credit{font-size:8px;color:rgba(255,255,255,0.5);line-height:1.4;
  font-family:Georgia,serif;white-space:normal}
#logo-credit a{color:rgba(255,255,255,0.72);text-decoration:none}
#lang-btns{display:flex;gap:4px;align-items:center;flex-shrink:0}
.lang-btn{padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.2);color:rgba(255,255,255,0.55);font-size:12px;
  font-weight:700;cursor:pointer;letter-spacing:.5px;line-height:1.4;font-family:Georgia,serif}
.lang-btn.active{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.95);
  border-color:rgba(255,255,255,0.5)}

/* ══ MAIN ══ */
#main{flex:1;display:flex;align-items:stretch;position:relative;z-index:1;
  min-height:0;overflow:visible}

/* ── Stat panels ── */
.stat-panel{flex:1.4;display:flex;flex-direction:column;align-items:center;
  justify-content:space-evenly;gap:0;overflow:visible;padding:8px 0}
.icon-hp{color:#aa2020}
.btn-chg{font-size:min(11vw,calc(var(--vh)*12));font-weight:900;
  color:rgba(255,255,255,0.55);background:none;border:none;cursor:pointer;
  line-height:1;padding:0 2vw;font-family:Georgia,serif}
.btn-chg:active{color:rgba(255,255,255,0.95);transform:scale(1.1)}
.stat-num{font-size:min(32vw,calc(var(--vh)*44));font-weight:900;color:#7a1a1a;
  text-shadow:4px 5px 0 #3a0505,0 0 36px rgba(100,0,0,0.3);
  line-height:1;min-width:1.8ch;text-align:center;font-variant-numeric:tabular-nums;
  font-family:'VikingRunes',Georgia,serif!important}
#atk-val{color:#7a6048;text-shadow:4px 5px 0 #3a2a10,0 0 36px rgba(80,60,20,0.25)}

/* ── Boss panel ── */
#boss-panel{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:0;gap:2px;overflow:visible;min-height:0}

/* Boss footer: immunity + suit selector — same width */
#boss-footer{margin-top:auto;display:inline-flex;flex-direction:column;
  align-items:stretch;gap:3px;padding-bottom:clamp(2px,1vh,10px)}

/* Immunity */
#immunity{display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,0.22);border-radius:5px;padding:4px 12px;
  justify-content:center}
.imm-wrap{position:relative;width:36px;height:36px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
.imm-sym{font-size:30px;line-height:1;opacity:0.35;filter:grayscale(50%)}
.imm-x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:900;color:#e01111;line-height:1;pointer-events:none}
.imm-text{font-size:16px;color:rgba(255,255,255,0.72);letter-spacing:.3px;
  line-height:1.3;max-width:none}

/* Card zone — fills all available boss-panel space */
#card-zone{display:flex;align-items:flex-start;gap:4px;overflow:visible;
  flex:1;min-height:0;width:100%;justify-content:center}

/* Card: height-driven so it fills card-zone */
#card-wrap{position:relative;
  height:min(96%,calc(var(--vh)*80));
  aspect-ratio:5/7;overflow:visible;flex-shrink:0}

#boss-card{position:absolute;inset:0;
  background:#fdf6e8;border-radius:10px;color-scheme:light;
  border:2px solid rgba(210,200,175,0.7);
  box-shadow:0 8px 28px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.6);
  z-index:1}

/* Character image — overflows card bottom-right */
.b-img{position:absolute;top:0;left:0;
  width:132%;height:121%;
  object-fit:contain;object-position:center bottom;
  z-index:2;pointer-events:none}

/* Rank+suit label — sits above everything */
.b-label-top{position:absolute;top:5px;left:5px;z-index:3;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  background:#fdf6e8;border-radius:4px;padding:3px 5px;line-height:1}
.b-rank{font-size:min(4.5vw,calc(var(--vh)*6));font-weight:900;line-height:1}
.b-suit{font-size:min(5vw,calc(var(--vh)*6.5));line-height:1}
.b-fallback{display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;width:100%;height:100%}
.b-name{font-size:7px;color:#888;text-transform:uppercase;letter-spacing:.5px}

/* Kill button (skull) */
#kill-btn{width:min(8vw,calc(var(--vh)*9));height:min(8vw,calc(var(--vh)*9));
  border-radius:8px;background:#fdf6e8;
  border:1px solid rgba(180,180,180,0.5);box-shadow:0 2px 8px rgba(0,0,0,0.35);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  padding:min(0.8vw,calc(var(--vh)*1));flex-shrink:0}
#kill-btn img{width:100%;height:100%;object-fit:contain}
#kill-btn:active{transform:scale(.88)}

/* Suit selector */
#suit-selector{display:flex;gap:clamp(8px,2vw,36px);align-items:center;
  justify-content:center}
.suit-btn{width:min(11vw,calc(var(--vh)*13));height:min(11vw,calc(var(--vh)*13));
  background:none;border:none;font-size:min(8vw,calc(var(--vh)*11));
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;opacity:0.72;transition:transform .12s,opacity .12s;position:relative}
.suit-btn span{-webkit-text-stroke:2px rgba(255,255,255,0.82);paint-order:stroke fill}
.suit-btn.active{opacity:1;transform:scale(1.28)}
.suit-btn.active span{-webkit-text-stroke:2.5px rgba(255,255,255,1);paint-order:stroke fill}
.suit-btn.killed{opacity:0.18;cursor:not-allowed;filter:none}
.suit-btn.killed::after{content:'✕';position:absolute;font-size:66px;
  color:#cc0000;font-weight:900;line-height:1;
  text-shadow:0 0 8px rgba(180,0,0,0.5)}

.cr{color:#7a1a1a}.cb{color:#7a6048}

/* ══ LANDSCAPE: immunity docked to stat panel ══ */
@media (orientation:landscape){
  body{background-position:center 100%;background-size:175%}
  .stat-panel{position:relative}
  /* Reduce card height so image (121%) stays within card-zone — no clipping needed */
  #card-wrap{height:calc(var(--vh)*64)}
  .stat-panel #immunity{
    position:absolute;bottom:clamp(4px,1vh,14px);
    left:50%;transform:translateX(-50%);
    width:90%;justify-content:center;max-width:none;
    padding:5px 12px}
  .stat-panel .imm-wrap{width:52px;height:52px}
  .stat-panel .imm-sym{font-size:40px}
  .stat-panel .imm-x{font-size:40px}
  .stat-panel .imm-text{font-size:22px;white-space:nowrap}
}

/* ══ PORTRAIT ══ */
@media (orientation:portrait){
  /* Grid: boss panel fills top, stats row at bottom */
  #main{display:grid;
    grid-template-areas:"boss boss""hp atk";
    grid-template-rows:1fr calc(var(--vh)*22);
    grid-template-columns:1fr 1fr}
  #main>.stat-panel:first-child{grid-area:hp}
  #main>.stat-panel:last-child{grid-area:atk}
  #boss-panel{grid-area:boss;min-height:0}

  /* Stat panels: fix overflow — no min-width, smaller fonts, tighter gap */
  .stat-panel{flex-direction:row;justify-content:center;align-items:center;gap:1.5vw}
  .stat-num{font-size:min(14vw,calc(var(--vh)*12));min-width:0}
  .btn-chg{font-size:min(12vw,calc(var(--vh)*10));padding:0 1.5vw}

  /* Card zone: positioning context; card centered; kill-btn absolute bottom-left */
  #card-zone{flex-direction:column;align-items:center;justify-content:flex-start;position:relative}
  /* Explicit vh dimensions — avoid % height on flex item (resolves to 0 in flex chain) */
  #card-wrap{height:calc(var(--vh)*52);width:calc(var(--vh)*37.1);flex-shrink:0}
  #kill-btn{position:absolute;bottom:0;left:0;
    width:min(16vw,calc(var(--vh)*9));height:min(16vw,calc(var(--vh)*9))}

  /* Immunity: bigger x2 */
  #immunity{padding:6px 14px}
  .imm-wrap{width:52px;height:52px}
  .imm-sym{font-size:42px}
  .imm-x{font-size:42px}
  .imm-text{font-size:22px;max-width:none}

  /* Suit buttons: larger */
  .suit-btn{width:min(15vw,calc(var(--vh)*12));height:min(15vw,calc(var(--vh)*12));
    font-size:min(11vw,calc(var(--vh)*10))}

  /* Lang bar: larger */
  .lang-btn{font-size:14px;padding:5px 12px}
}

/* ══ OVERLAYS ══ */
.overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.86);
  backdrop-filter:blur(4px);align-items:center;justify-content:center;
  flex-direction:column;gap:14px;padding:20px}
.overlay.show{display:flex}
.ov-title{font-size:clamp(18px,5vw,28px);font-weight:900;color:#d4aa44;
  text-shadow:0 0 22px rgba(212,170,68,0.5);text-align:center}
.ov-sub{font-size:13px;color:rgba(255,255,255,0.65);text-align:center}
.btn-next{padding:11px 30px;background:linear-gradient(155deg,#1a5c2a,#0c2e15);
  color:rgba(195,255,195,0.95);border:1px solid #3d8a4d;border-radius:7px;
  font-size:14px;font-weight:bold;cursor:pointer;font-family:Georgia,serif;
  text-transform:uppercase;letter-spacing:2px}
.btn-restart{padding:11px 30px;background:linear-gradient(155deg,#5a1818,#2d0808);
  color:rgba(255,195,195,0.95);border:1px solid #8a3030;border-radius:7px;
  font-size:14px;font-weight:bold;cursor:pointer;font-family:Georgia,serif;
  text-transform:uppercase;letter-spacing:2px}
.trophy{font-size:50px;line-height:1}
</style>
</head>
<body>


<!-- ══ Language bar ══ -->
<div id="lang-bar">
  <div id="logo-block">
    <img id="logo-img" src="images/IMG_1659.webp" alt="Regicide" onerror="this.style.display='none'">
    <div id="logo-credit">
      <span id="lbl-fan"></span> <a href="https://www.regicidegame.com" target="_blank">Badgers from Mars</a>.<br>
      <span id="lbl-createdby"></span> <a href="https://boardgamegeek.com/user/apiiii" target="_blank">apiiii</a> <span id="lbl-onbgg"></span>.
    </div>
  </div>
  <div id="lang-btns">
    <button class="lang-btn active" data-lang="fr" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="it" onclick="setLang('it')">IT</button>
    <button class="lang-btn" data-lang="de" onclick="setLang('de')">DE</button>
    <button class="lang-btn" data-lang="jp" onclick="setLang('jp')">JP</button>
    <button class="lang-btn" data-lang="cn" onclick="setLang('cn')">CN</button>
  </div>
</div>

<!-- ══ Main ══ -->
<div id="main">

  <!-- HP -->
  <div class="stat-panel" id="hp-panel">
    <button class="btn-chg"
      onmousedown="startHold(()=>changeHP(1),event)" ontouchstart="startHold(()=>changeHP(1),event)"
      onmouseup="stopHold()" onmouseleave="stopHold()" ontouchend="stopHold()" ontouchcancel="stopHold()">+</button>
    <div class="stat-num" id="hp-val">20</div>
    <button class="btn-chg"
      onmousedown="startHold(()=>changeHP(-1),event)" ontouchstart="startHold(()=>changeHP(-1),event)"
      onmouseup="stopHold()" onmouseleave="stopHold()" ontouchend="stopHold()" ontouchcancel="stopHold()">−</button>
  </div>

  <!-- Boss -->
  <div id="boss-panel">
    <div id="card-zone">
      <button id="kill-btn" onclick="killBoss()">
        <img src="images/Dead_king.png" alt="Kill">
      </button>
      <div id="card-wrap"></div>
    </div>
    <div id="boss-footer">
      <div id="immunity">
        <div class="imm-wrap">
          <span class="imm-sym" id="imm-sym"></span>
          <div class="imm-x">✕</div>
        </div>
        <div class="imm-text" id="imm-text"></div>
      </div>
      <div id="suit-selector"></div>
    </div>
  </div>

  <!-- ATK -->
  <div class="stat-panel" id="atk-panel">
    <button class="btn-chg"
      onmousedown="startHold(()=>changeATK(1),event)" ontouchstart="startHold(()=>changeATK(1),event)"
      onmouseup="stopHold()" onmouseleave="stopHold()" ontouchend="stopHold()" ontouchcancel="stopHold()">+</button>
    <div class="stat-num" id="atk-val">10</div>
    <button class="btn-chg"
      onmousedown="startHold(()=>changeATK(-1),event)" ontouchstart="startHold(()=>changeATK(-1),event)"
      onmouseup="stopHold()" onmouseleave="stopHold()" ontouchend="stopHold()" ontouchcancel="stopHold()">−</button>
  </div>

</div>

<!-- ══ Overlays ══ -->
<div class="overlay" id="ov-next">
  <div class="ov-title" id="ov-rank-title"></div>
  <div class="ov-sub" id="ov-sub"></div>
  <button class="btn-next" id="ov-fight-btn" onclick="advanceBoss()"></button>
</div>

<div class="overlay" id="ov-win">
  <div class="trophy">👑</div>
  <div class="ov-title" id="ov-win-title" style="color:#ffd700"></div>
  <div class="ov-sub" id="ov-win-sub"></div>
  <button class="btn-restart" id="ov-restart-btn" onclick="resetGame()"></button>
</div>

<script src="app.js"></script>
</body>
</html>
