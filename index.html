<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Regicide</title>
<style>
@font-face{font-family:'VikingRunes';src:url('fonts/viking_middle_runes.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:block}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden}
body{display:flex;flex-direction:column;font-family:Georgia,serif;position:relative;
  background:linear-gradient(180deg,#c2dbd0 0%,#9dc0ba 20%,#7aa5a0 40%,#5d8888 60%,#456070 80%,#344a5e 100%)}

#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
#bg svg{position:absolute;bottom:0;left:0;width:100%;height:100%}

/* ══ BOSS TRACK (top row) ══ */
#boss-track{height:18vh;min-height:56px;max-height:84px;display:flex;align-items:center;
  justify-content:center;padding:4px 8px;gap:5px;background:rgba(0,0,0,0.3);
  border-bottom:1px solid rgba(255,255,255,0.1);overflow-x:auto;overflow-y:hidden;
  flex-shrink:0;position:relative;z-index:1}
#boss-track::-webkit-scrollbar{display:none}

/* Base track card */
.tc{position:relative;flex-shrink:0;width:34px;height:48px;background:white;color-scheme:light;
  border-radius:4px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1px;box-shadow:1px 2px 5px rgba(0,0,0,0.45)}
.tc-rank{font-size:11px;font-weight:900;line-height:1}
.tc-suit{font-size:13px;line-height:1}

/* Killed card */
.tc-dead .tc-x{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;font-size:28px;font-weight:900;color:#cc0000;line-height:1}

/* Current boss card */
.tc-current{border:2px solid rgba(255,220,100,0.9);
  box-shadow:0 0 10px rgba(255,200,50,0.5),1px 2px 5px rgba(0,0,0,0.5)}

/* Future cards – same rank */
.tc-future-same{opacity:0.38;filter:grayscale(30%)}
/* Future cards – other rank */
.tc-future-other{opacity:0.18;filter:grayscale(60%)}
/* Separator between rank groups */
.tc-sep{width:1px;height:36px;background:rgba(255,255,255,0.2);flex-shrink:0}

/* ══ MAIN AREA ══ */
#main{flex:1;display:flex;align-items:stretch;padding:6px 4px;gap:4px;
  position:relative;z-index:1;min-height:0;
  justify-content:center;max-width:520px;margin:0 auto;width:100%}

.stat-panel{flex:0 0 90px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px}
.stat-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.5);
  text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:4px}
.icon-hp{color:#aa2020;font-size:14px}
.icon-atk{font-size:16px}
.stat-num{font-size:clamp(42px,9vw,72px);font-weight:900;color:#7a1a1a;
  text-shadow:2px 3px 0 #3a0505,0 0 20px rgba(100,0,0,0.25);line-height:1;
  min-width:2ch;text-align:center;font-variant-numeric:tabular-nums;
  font-family:'VikingRunes',Georgia,serif!important}
.btn-plus{width:46px;height:46px;border-radius:8px;border:2px solid rgba(255,255,255,0.28);
  background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.72);font-size:22px;
  font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.btn-minus{width:68px;height:68px;border-radius:8px;border:2px solid rgba(200,60,60,0.42);
  background:rgba(130,12,12,0.22);color:rgba(255,185,185,0.9);font-size:40px;
  font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.btn-plus:active{background:rgba(255,255,255,0.18);transform:scale(.88)}
.btn-minus:active{background:rgba(130,12,12,0.44);transform:scale(.88)}

/* ══ BOSS PANEL ══ */
#boss-panel{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:space-evenly;gap:2px}

/* Immunity badge above card */
#immunity{display:flex;flex-direction:column;align-items:center;gap:2px;
  background:rgba(0,0,0,0.25);border-radius:6px;padding:4px 8px}
.imm-row{display:flex;align-items:center;gap:5px}
.imm-wrap{position:relative;width:30px;height:30px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
.imm-sym{font-size:22px;line-height:1;opacity:0.35;filter:grayscale(50%)}
.imm-x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:900;color:#e01111;line-height:1;pointer-events:none}
.imm-text{font-size:9px;color:rgba(255,255,255,0.75);letter-spacing:.5px;
  text-align:center;line-height:1.3;max-width:110px}

#boss-card{width:82px;height:112px;background:white;border-radius:8px;
  border:2px solid rgba(210,200,175,0.7);
  box-shadow:0 6px 22px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.6);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  position:relative;overflow:hidden;color-scheme:light}
.b-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:6px}
/* bottom-right corner badge inside card */
.b-corner{position:absolute;bottom:5px;right:5px;width:22px;height:22px;
  border-radius:5px;background:white;display:flex;align-items:center;
  justify-content:center;font-size:15px;line-height:1;
  box-shadow:none}
.b-rank{font-size:20px;font-weight:900;line-height:1}
.b-suit{font-size:36px;line-height:1}
.b-name{font-size:8px;color:#888;text-transform:uppercase;letter-spacing:.5px}
/* fallback (no image): show text normally */
.b-fallback{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;width:100%}

/* Suit selector */
#suit-selector{display:flex;gap:7px;align-items:center}
.suit-btn{width:32px;height:32px;border-radius:7px;border:2px solid rgba(255,255,255,0.18);
  background:rgba(0,0,0,0.2);font-size:17px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;line-height:1;transition:transform .12s}
.suit-btn.active{border-color:rgba(255,255,255,0.75);background:rgba(255,255,255,0.2);
  transform:scale(1.2);box-shadow:0 0 8px rgba(255,255,255,0.3)}
.suit-btn.killed{opacity:0.25;cursor:not-allowed;border-color:rgba(180,0,0,0.35);
  position:relative}
.suit-btn.killed::after{content:'✕';position:absolute;font-size:13px;color:#cc0000;font-weight:900}

#card-zone{display:flex;flex-direction:row;align-items:center;gap:4px}
#card-side{display:flex;align-items:center;justify-content:center}
#kill-btn{width:30px;height:30px;border-radius:6px;background:white;
  border:1px solid rgba(180,180,180,0.5);box-shadow:0 2px 6px rgba(0,0,0,0.3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;padding:3px;flex-shrink:0}
#kill-btn img{width:100%;height:100%;object-fit:contain}
#kill-btn:active{transform:scale(.88)}

.cr{color:#7a0e0e}.cb{color:#151010}

/* ══ OVERLAYS ══ */
.overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.86);
  backdrop-filter:blur(4px);align-items:center;justify-content:center;
  flex-direction:column;gap:14px;padding:20px}
.overlay.show{display:flex}
.ov-title{font-size:clamp(18px,5vw,28px);font-weight:900;color:#d4aa44;
  text-shadow:0 0 22px rgba(212,170,68,0.5);text-align:center}
.ov-sub{font-size:13px;color:rgba(255,255,255,0.65);text-align:center}
.btn-next{padding:11px 30px;background:linear-gradient(155deg,#1a5c2a,#0c2e15);
  color:rgba(195,255,195,0.95);border:1px solid #3d8a4d;border-radius:7px;
  font-size:14px;font-weight:bold;cursor:pointer;font-family:Georgia,serif;
  text-transform:uppercase;letter-spacing:2px}
.btn-restart{padding:11px 30px;background:linear-gradient(155deg,#5a1818,#2d0808);
  color:rgba(255,195,195,0.95);border:1px solid #8a3030;border-radius:7px;
  font-size:14px;font-weight:bold;cursor:pointer;font-family:Georgia,serif;
  text-transform:uppercase;letter-spacing:2px}
.trophy{font-size:50px;line-height:1}
</style>
</head>
<body>

  <polygon fill="#364a5e" points="0,600 0,500 40,488 80,500 130,480 180,498 240,472 300,492 360,475 420,495 480,478 540,498 600,480 660,500 720,482 780,502 840,482 900,505 960,485 1000,500 1000,600"/>

    <polygon points="840,480 833,502 847,502"/><polygon points="840,490 830,512 850,512"/><rect x="838" y="502" width="4" height="18"/>
    <polygon points="960,482 953,504 967,504"/><polygon points="960,492 950,514 970,514"/><rect x="958" y="504" width="4" height="18"/>
  </g>
  <polygon fill="#2a3848" points="0,600 0,540 40,528 80,542 130,522 180,540 240,518 300,538 360,520 420,540 480,522 540,542 600,524 660,544 720,525 780,545 840,526 900,548 960,528 1000,545 1000,600"/>
</svg>
</div>

<!-- ══ Boss track ══ -->
<div id="boss-track"></div>

<!-- ══ Main ══ -->
<div id="main">
  <div class="stat-panel">
    <div class="stat-label"><span class="icon-hp">♥</span> PV</div>
    <button class="btn-plus"
      onmousedown="startHold(()=>changeHP(1),event)" ontouchstart="startHold(()=>changeHP(1),event)"
      onmouseup="stopHold()" onmouseleave="stopHold()" ontouchend="stopHold()" ontouchcancel="stopHold()">+</button>
    <div class="stat-num" id="hp-val">20</div>
    <button class="btn-minus"
      onmousedown="startHold(()=>changeHP(-1),event)" ontouchstart="startHold(()=>changeHP(-1),event)"
      onmouseup="stopHold()" onmouseleave="stopHold()" ontouchend="stopHold()" ontouchcancel="stopHold()">−</button>
  </div>

  <div id="boss-panel">
    <div id="immunity">
      <div class="imm-row">
        <div class="imm-wrap">
          <span class="imm-sym" id="imm-sym"></span>
          <div class="imm-x">✕</div>
        </div>
        <div class="imm-text" id="imm-text"></div>
      </div>
    </div>
    <div id="card-zone">
      <div id="card-side">
        <button id="kill-btn" onclick="killBoss()"><img src="images/Dead_king.png" alt="Tuer"></button>
      </div>
      <div id="boss-card"></div>
    </div>
    <div id="suit-selector"></div>
  </div>

  <div class="stat-panel">
    <div class="stat-label"><span class="icon-atk">🪓</span> ATK</div>
    <button class="btn-plus"
      onmousedown="startHold(()=>changeATK(1),event)" ontouchstart="startHold(()=>changeATK(1),event)"
      onmouseup="stopHold()" onmouseleave="stopHold()" ontouchend="stopHold()" ontouchcancel="stopHold()">+</button>
    <div class="stat-num" id="atk-val">10</div>
    <button class="btn-minus"
      onmousedown="startHold(()=>changeATK(-1),event)" ontouchstart="startHold(()=>changeATK(-1),event)"
      onmouseup="stopHold()" onmouseleave="stopHold()" ontouchend="stopHold()" ontouchcancel="stopHold()">−</button>
  </div>
</div>

<div class="overlay" id="ov-next">
  <div class="ov-title">⚔ Rang vaincu ! ⚔</div>
  <div class="ov-sub" id="ov-sub"></div>
  <button class="btn-next" onclick="advanceBoss()">Au combat !</button>
</div>

<div class="overlay" id="ov-win">
  <div class="trophy">👑</div>
  <div class="ov-title" style="color:#ffd700">Victoire Totale !</div>
  <div class="ov-sub">Tous les boss ont été vaincus !</div>
  <button class="btn-restart" onclick="resetGame()">Recommencer</button>
</div>

<script>

const SUITS=[
  {sym:'♣',cls:'cb',code:'C',color:'#2e7d32'},
  {sym:'♦',cls:'cr',code:'D',color:'#e65c00'},
  {sym:'♥',cls:'cr',code:'H',color:'#c0392b'},
  {sym:'♠',cls:'cb',code:'S',color:'#1a1a1a'},
];
const RANKS=[{sym:'J',name:'Valet',hp:20,atk:10},{sym:'Q',name:'Dame',hp:30,atk:15},{sym:'K',name:'Roi',hp:40,atk:20}];

let rankIdx=0,suitIdx=0,killedSuits=new Set(),hp=20,atk=10,dead=[],locked=false;
let holdTimer=null,holdInterval=null;

function startHold(fn,e){
  if(e&&e.type==='touchstart')e.preventDefault();
  stopHold();fn();
  holdTimer=setTimeout(()=>{holdInterval=setInterval(fn,80);},380);
}
function stopHold(){clearTimeout(holdTimer);clearInterval(holdInterval);}

function boss(){return RANKS[rankIdx];}
function suit(){return SUITS[suitIdx];}

function setSuit(i){
  if(killedSuits.has(i))return;
  suitIdx=i;
  renderBossCard();renderImmunity();renderSuitSelector();renderBossTrack();
}

/* ── Boss track ── */
function renderBossTrack(){
  const track=document.getElementById('boss-track');
  track.innerHTML='';

  let deadIdx=0;

  for(let r=0;r<RANKS.length;r++){
    // separator between rank groups (not before first)
    if(r>0){const sep=document.createElement('div');sep.className='tc-sep';track.appendChild(sep);}

    for(let s=0;s<4;s++){
      const rk=RANKS[r];
      // How many of this rank have been killed?
      const killedOfRank=dead.filter(d=>d.rank===rk.sym);
      const isCurrentRank=r===rankIdx;
      const isPastRank=r<rankIdx;

      let card;

      if(isPastRank){
        // All 4 killed – find matching dead entry
        const d=killedOfRank[s];
        card=makeCard(rk.sym,d?d.suit:null,'dead');
      } else if(isCurrentRank){
        if(killedSuits.size>s){
          // This slot is a killed suit in current rank
          // find which dead entry corresponds
          const killed=[...killedSuits];
          const si=killed[s];
          const st=SUITS[si];
          card=makeCard(rk.sym,st,'dead');
        } else if(killedSuits.size===s){
          // This is the current boss being fought
          card=makeCard(rk.sym,suit(),'current');
        } else {
          // Future slot same rank – suit unknown
          card=makeCard(rk.sym,null,'future-same');
        }
      } else {
        // Future rank
        card=makeCard(rk.sym,null,'future-other');
      }

      track.appendChild(card);
    }
  }
}

function makeCard(rankSym,suit,state){
  const el=document.createElement('div');
  el.className='tc tc-'+state;
  if(state==='future-same'||state==='future-other'){
    // hidden suit
    el.innerHTML=`<span class="tc-rank" style="color:#666">${rankSym}</span>`+
      `<span class="tc-suit" style="color:#aaa;font-size:11px">?</span>`;
  } else {
    const cls=suit?suit.cls:'cb';
    const sym=suit?suit.sym:'?';
    el.innerHTML=`<span class="tc-rank ${cls}">${rankSym}</span>`+
      `<span class="tc-suit ${cls}">${sym}</span>`;
    if(state==='dead'){
      el.classList.add('tc-dead');
      el.innerHTML+=`<div class="tc-x">✕</div>`;
    }
  }
  return el;
}

/* ── Immunity ── */
const SUIT_POWERS={
  '♣':'Trèfle · Immunité aux dégâts doublés',
  '♦':'Carreau · Immunité à la pioche',
  '♥':'Cœur · Immunité à la guérison',
  '♠':'Pique · Immunité au bouclier',
};
function renderImmunity(){
  const s=suit();
  const sym=document.getElementById('imm-sym');
  sym.textContent=s.sym;
  sym.className='imm-sym '+s.cls;
  document.getElementById('imm-text').textContent=SUIT_POWERS[s.sym]||'';
}

/* ── Boss card ── */
function renderBossCard(){
  const b=boss(),s=suit();
  const imgSrc=`images/${b.sym}${s.code}.png`;
  const card=document.getElementById('boss-card');
  card.innerHTML='';
  // bottom-right badge inside card
  const badge=document.createElement('div');
  badge.className='b-corner';
  badge.style.border='none';
  badge.innerHTML=`<span style="color:${s.color};font-size:15px;line-height:1">${s.sym}</span>`;
  const img=document.createElement('img');
  img.className='b-img';
  img.alt=`${b.name} ${s.sym}`;
  // onerror BEFORE src to guarantee it fires even on instant cache failure
  img.onerror=function(){
    this.remove();
    ov.remove();
    card.innerHTML=`<span class="b-rank ${s.cls}">${b.sym}</span>`+
      `<span class="b-suit ${s.cls}">${s.sym}</span>`+
      `<span class="b-name">${b.name}</span>`;
  };
  img.src=imgSrc;
  card.appendChild(img);
  card.appendChild(badge);
}

/* ── Suit selector ── */
function renderSuitSelector(){
  const sel=document.getElementById('suit-selector');
  sel.innerHTML='';
  SUITS.forEach((s,i)=>{
    const btn=document.createElement('button');
    const killed=killedSuits.has(i),active=i===suitIdx;
    btn.className='suit-btn'+(active?' active':'')+(killed?' killed':'');
    btn.disabled=killed;
    btn.innerHTML=`<span class="${s.cls}">${s.sym}</span>`;
    if(!killed)btn.onclick=()=>setSuit(i);
    sel.appendChild(btn);
  });
}

/* ── Killed row (now inside track) ── */
function updateNums(){
  document.getElementById('hp-val').textContent=hp;
  document.getElementById('atk-val').textContent=atk;
}

function changeHP(d){
  if(locked)return;
  hp=Math.max(0,hp+d);updateNums();
  if(hp===0){locked=true;setTimeout(handleDeath,260);}
}
function changeATK(d){atk=Math.max(0,atk+d);updateNums();}

function killBoss(){
  if(locked)return;
  locked=true;hp=0;updateNums();
  setTimeout(handleDeath,260);
}

function handleDeath(){
  dead.push({rank:boss().sym,suit:suit()});
  killedSuits.add(suitIdx);

  if(killedSuits.size<4){
    for(let i=0;i<4;i++){if(!killedSuits.has(i)){suitIdx=i;break;}}
    hp=boss().hp;atk=boss().atk;locked=false;
    renderBossCard();renderImmunity();renderSuitSelector();renderBossTrack();updateNums();
  } else {
    rankIdx++;killedSuits=new Set();suitIdx=0;
    if(rankIdx>=RANKS.length){
      renderBossTrack();
      document.getElementById('ov-win').classList.add('show');return;
    }
    renderBossTrack();
    const next=RANKS[rankIdx];
    document.getElementById('ov-sub').textContent=
      `Prochain rang : ${next.name}s  (PV ${next.hp} · ATK ${next.atk})`;
    document.getElementById('ov-next').classList.add('show');
  }
}

function advanceBoss(){
  hp=boss().hp;atk=boss().atk;locked=false;
  document.getElementById('ov-next').classList.remove('show');
  }

function resetGame(){
  rankIdx=0;suitIdx=0;killedSuits=new Set();dead=[];locked=false;
  hp=RANKS[0].hp;atk=RANKS[0].atk;
  document.getElementById('ov-win').classList.remove('show');
  renderBossCard();renderImmunity();renderSuitSelector();renderBossTrack();updateNums();
}

// Load font via FontFace API so it's guaranteed available before first render
(function(){
  if(typeof FontFace==='undefined'){init();return;}
  const ff=new FontFace('VikingRunes','url(fonts/viking_middle_runes.ttf)');
  ff.load().then(f=>{document.fonts.add(f);}).catch(()=>{}).finally(()=>{init();});
})();
function init(){
  renderBossCard();renderImmunity();renderSuitSelector();renderBossTrack();updateNums();
}
</script>
</body>
